apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: tinker
  annotations:
    run.googleapis.com/ingress: internal-and-cloud-load-balancing
spec:
  template:
    metadata:
      annotations:
        # Scale to zero when idle (cost saving)
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "5"
        # Attach service account — credentials come from Workload Identity, not a key file
        run.googleapis.com/service-account: tinker-readonly@PROJECT_ID.iam.gserviceaccount.com
    spec:
      containerConcurrency: 80
      timeoutSeconds: 300
      containers:
        - image: REGION-docker.pkg.dev/PROJECT_ID/tinker/tinker:latest
          ports:
            - containerPort: 8000
          env:
            - name: TINKER_BACKEND
              value: gcp
            - name: GCP_PROJECT_ID
              value: PROJECT_ID
            - name: TINKER_SERVER_PORT
              value: "8000"
          # Secrets come from Secret Manager — not env var files
          envFrom: []
          env:
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  key: latest
                  name: tinker-anthropic-api-key
            - name: TINKER_API_KEYS
              valueFrom:
                secretKeyRef:
                  key: latest
                  name: tinker-api-keys
            - name: SLACK_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  key: latest
                  name: tinker-slack-bot-token
            - name: SLACK_SIGNING_SECRET
              valueFrom:
                secretKeyRef:
                  key: latest
                  name: tinker-slack-signing-secret
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  key: latest
                  name: tinker-github-token
          resources:
            limits:
              cpu: "1"
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
