version: "3.9"

# Local development stack.
# Brings up Tinker server + a minimal Grafana observability stack (Loki + Prometheus + Grafana UI).
# Use this to develop without needing a cloud account.
#
# Usage:
#   cp .env.example .env && edit .env
#   docker compose -f deploy/docker-compose.yml up

services:

  # ── Tinker Agent Server ────────────────────────────────────────────────────
  tinker:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    ports:
      - "8000:8000"
    environment:
      TINKER_BACKEND: grafana
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      GRAFANA_LOKI_URL: http://loki:3100
      GRAFANA_PROMETHEUS_URL: http://prometheus:9090
      GRAFANA_TEMPO_URL: http://tempo:3200
      TINKER_API_KEYS: ${TINKER_API_KEYS:-[]}
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN:-}
      SLACK_SIGNING_SECRET: ${SLACK_SIGNING_SECRET:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_REPO: ${GITHUB_REPO:-}
      TINKER_REPO_PATH: /repo
      TINKER_LOG_LEVEL: DEBUG
    volumes:
      - ${TINKER_REPO_PATH:-/tmp}:/repo:ro
    depends_on:
      loki:
        condition: service_healthy
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Loki (log storage) ─────────────────────────────────────────────────────
  loki:
    image: grafana/loki:2.9.4
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Prometheus (metrics) ───────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.50.1
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9090/-/healthy || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Grafana UI (optional, for visual exploration) ──────────────────────────
  grafana:
    image: grafana/grafana:10.3.3
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    depends_on:
      - loki
      - prometheus
